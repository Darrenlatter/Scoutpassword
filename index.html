<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Scout: OSINT & Password Security Academy</title>
    <style>
        :root {
            --scout-purple: #512D6D;
            --scout-green: #006A4E;
            --dark-bg: #15151a;
            --card-bg: #22222b;
            --input-bg: #121216;
            --text-light: #f4f4f9;
            --accent-orange: #e65c00;
            --success-green: #2ecc71;
            --fail-red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border-top: 6px solid var(--scout-purple);
        }

        .score-badge {
            background: #333344;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: #ffd700;
            display: inline-block;
            margin-bottom: 15px;
            border: 1px solid #444455;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #ffffff;
            font-size: 1.6rem;
        }

        .system-status {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #bbb;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: var(--input-bg);
            color: #fff;
            box-sizing: border-box;
            font-size: 1rem;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--scout-purple);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background-color: var(--scout-purple);
            color: white;
        }

        .btn-primary:hover { background-color: #633985; }

        .btn-secondary {
            background-color: #3a3a4a;
            color: #ddd;
        }

        .btn-secondary:hover { background-color: #4a4a5a; }

        .btn-next {
            background-color: var(--scout-green);
            color: white;
            display: none;
        }
        .btn-next:hover { background-color: #008462; }

        .attempts-box {
            text-align: center;
            margin: 15px 0;
            font-weight: bold;
            color: var(--accent-orange);
            font-size: 1.1rem;
        }

        .feedback-box {
            background-color: var(--input-bg);
            padding: 15px;
            border-radius: 6px;
            min-height: 60px;
            margin-top: 15px;
            border-left: 4px solid #444;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* Highlighting keywords in the bio */
        .keyword {
            color: #ffcc00;
            font-weight: bold;
            text-decoration: underline dotted;
            cursor: help;
        }

        /* Educational Panel */
        .lesson-panel {
            background: #1a2536;
            border: 1px solid #2b3e5a;
            border-radius: 6px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .lesson-title {
            color: #5dade2;
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }

        /* Modal / Popup Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            max-width: 420px;
            width: 90%;
            border-left: 5px solid var(--scout-green);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .close-btn {
            float: right;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            line-height: 1;
            color: #aaa;
        }
        .close-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <div class="score-badge">Total Academy Score: <span id="total-score">0</span> pts</div>
    </div>

    <div class="container">
        <h2>OSINT & Password Security Trainer</h2>
        <div class="system-status" id="profile-status">Loading systems...</div>

        <div class="form-group">
            <label for="difficulty">Select Training Difficulty:</label>
            <select id="difficulty" onchange="changeDifficulty()">
                <option value="easy">Easy (Single words, clear personal details)</option>
                <option value="medium">Medium (Combined words, specific symbols)</option>
                <option value="hard">Hard (Leetspeak, complex configurations)</option>
            </select>
        </div>

        <hr style="border-color: #333; margin: 15px 0;">

        <div class="form-group">
            <label>Target Account Username</label>
            <input type="text" id="username" value="" disabled style="color: #888; font-family: monospace;">
        </div>

        <div class="form-group">
            <label for="password">Input Password Guess:</label>
            <input type="text" id="password" placeholder="Analyze the bio and guess..." autocomplete="off">
        </div>

        <div class="attempts-box" id="attempts-left">Attempts Remaining: 5</div>

        <button class="btn btn-primary" id="submit-btn" onclick="checkPassword()">Submit Exploit Attempt</button>
        <button class="btn btn-secondary" onclick="openModal()">Extract Target Intel (View Bio)</button>
        <button class="btn btn-next" id="next-btn" onclick="nextAccount()">Next Target Account →</button>

        <div class="feedback-box" id="feedback"></div>

        <div class="lesson-panel">
            <div class="lesson-title">🛡️ Cyber Security Lesson:</div>
            <div id="lesson-text"></div>
        </div>
    </div>

    <div id="bioModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 style="margin-top: 0; color: var(--scout-green);">Intercepted Personal Dossier</h3>
            <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 15px;"><em>Hackers look at social media profiles to spot these exact highlighted keywords to guess passwords!</em></p>
            <div id="bio-text" style="line-height: 1.6; font-size: 1rem;"></div>
        </div>
    </div>

    <script>
        // Expanded Database with 3 accounts per level
        const db = {
            easy: {
                lesson: "<strong>The Danger of Personal Details:</strong> Weak passwords rely on single words, names, or years that can easily be found on a person's social media page (OSINT). Never use your hobbies, pets, or birth years!",
                accounts: [
                    {
                        username: "scout_leader_akela",
                        password: "Scouting1907",
                        bio: "<strong>Name:</strong> Akela Smith<br><strong>Favourite Hobby:</strong> They absolutely love <span class='keyword'>Scouting</span>.<br><strong>Fun Fact:</strong> They can tell you the exact <span class='keyword'>1907</span> year that Lord Baden-Powell founded the movement without blinking.",
                        clues: ["Starts with a Capital letter.", "Combines the hobby and the historic year.", "Format is: [Hobby][Year]."]
                    },
                    {
                        username: "nature_camper_22",
                        password: "Badger2023",
                        bio: "<strong>Name:</strong> Patrol Leader Ben<br><strong>Patrol Animal:</strong> He is the leader of the mighty <span class='keyword'>Badger</span> patrol.<br><strong>Memorable Event:</strong> He won his first major camping award in the year <span class='keyword'>2023</span>.",
                        clues: ["Animal name starts with a Capital letter.", "Combines the patrol animal and the award year.", "Format is: [Patrol][Year]."]
                    },
                    {
                        username: "adventure_kid",
                        password: "KayakAugust",
                        bio: "<strong>Name:</strong> Scout Explorer Timmy<br><strong>Favourite Watercraft:</strong> He spends every weekend in his red <span class='keyword'>Kayak</span>.<br><strong>Birth Month:</strong> Timmy was born in the middle of summer, specifically in <span class='keyword'>August</span>.",
                        clues: ["Both words start with a Capital letter.", "Combines his watercraft and his birth month.", "Format is: [Watercraft][Month]."]
                    }
                ]
            },
            medium: {
                lesson: "<strong>The Danger of Predictable Patterns:</strong> Just joining two common words together with an '&' or adding a '!' at the end is better than 'easy' passwords, but automated hacking tools (dictionaries) crack these in minutes.",
                accounts: [
                    {
                        username: "quartermaster_jones",
                        password: "Campfire&Marshmallows",
                        bio: "<strong>Role:</strong> Equipment manager.<br><strong>Night Routine:</strong> Loves setting up a roaring <span class='keyword'>Campfire</span>.<br><strong>Snack Habit:</strong> He never goes camping without roasting sweet <span class='keyword'>Marshmallows</span>. He shortcuts his logs using <span class='keyword'>&</span> instead of 'and'.",
                        clues: ["Both items capitalized.", "Joined together by the symbol mentioned.", "Format: [FireItem][Symbol][SweetTreatPlural]."]
                    },
                    {
                        username: "hiking_pro_sarah",
                        password: "Compass!Maps",
                        bio: "<strong>Bio:</strong> Always navigating.<br><strong>Navigation Gear:</strong> She trusts her physical magnetic <span class='keyword'>Compass</span>.<br><strong>Backup Tool:</strong> She keeps paper <span class='keyword'>Maps</span> in her pack. She separates her item lists with an <span class='keyword'>!</span> exclamation mark.",
                        clues: ["Both nouns are capitalized.", "Joined together by the punctuation mentioned.", "Format: [Tool1][!][Tool2Plural]."]
                    },
                    {
                        username: "rope_master",
                        password: "Knots#Splicing",
                        bio: "<strong>Bio:</strong> Pioneer craft expert.<br><strong>Primary Skill:</strong> Teaches dynamic rope <span class='keyword'>Knots</span>.<br><strong>Advanced Skill:</strong> Masters the art of rope <span class='keyword'>Splicing</span>. Uses the hashtag symbol <span class='keyword'>#</span> to tag things.",
                        clues: ["Both words are capitalized.", "Joined by the hashtag sign.", "Format: [Skill1Plural][#][Skill2]."]
                    }
                ]
            },
            hard: {
                lesson: "<strong>Leetspeak & Character Substitution:</strong> Replacing 'o' with '0' or 'e' with '3' used to look clever, but modern computer hackers already know these substitution algorithms. True strength requires pure randomness and length!",
                accounts: [
                    {
                        username: "explorer_sarah",
                        password: "3Feathers!W0rld",
                        bio: "<strong>Emblem Choice:</strong> Proud of the membership badge featuring the <span class='keyword'>3</span> <span class='keyword'>Feathers</span> design.<br><strong>Global Vision:</strong> Dedicated to the <span class='keyword'>World</span> Scout movement. <br><strong>Security Tweak:</strong> Swaps the letter 'o' for a number <span class='keyword'>0 (zero)</span> and links thoughts with a <span class='keyword'>!</span>.",
                        clues: ["Starts with the number of feathers.", "Followed by the capitalized feather noun, then an exclamation.", "The last word is 'World', but swap the 'o' for a zero."]
                    },
                    {
                        username: "cyber_scouter_dan",
                        password: "Pr3par3d@100",
                        bio: "<strong>Motto Focus:</strong> Strictly lives by the Scout motto: Always Be <span class='keyword'>Prepared</span>.<br><strong>Effort Level:</strong> Always gives <span class='keyword'>100</span> percent effort.<br><strong>Habit:</strong> Swaps all 'e' letters for the number <span class='keyword'>3</span>, and uses the <span class='keyword'>@</span> symbol as a connector.",
                        clues: ["The first word is 'Prepared' (Capitalized P), but replace both 'e's with '3's.", "Followed by the connector symbol.", "Ends with his effort level number."]
                    },
                    {
                        username: "tracker_wolf",
                        password: "W0lv3s*N1ght",
                        bio: "<strong>Spirit Animal:</strong> Identifies closely with wild <span class='keyword'>Wolves</span>.<br><strong>Active Hours:</strong> Prefers tracking in the dark of <span class='keyword'>Night</span>.<br><strong>Code Language:</strong> Replaces 'o' with <span class='keyword'>0</span>, replaces 'e' with <span class='keyword'>3</span>, and connects words with a star <span class='keyword'>*</span>.",
                        clues: ["Word 1: 'Wolves' (Capital W, 'o' becomes '0', 'e' becomes '3').", "Followed by a star.", "Word 2: 'Night' (Capital N, 'i' becomes '1')."]
                    }
                ]
            }
        };

        let currentLevel = 'easy';
        let accountIndex = 0;
        let attemptsLeft = 5;
        let score = 0;
        let gameOver = false;

        function changeDifficulty() {
            currentLevel = document.getElementById('difficulty').value;
            accountIndex = 0;
            initRound();
        }

        function initRound() {
            attemptsLeft = 5;
            gameOver = false;
            
            const currentAccount = db[currentLevel].accounts[accountIndex];
            
            // Set fields
            document.getElementById('username').value = currentAccount.username;
            document.getElementById('password').value = '';
            document.getElementById('password').disabled = false;
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('next-btn').style.display = 'none';
            
            document.getElementById('attempts-left').textContent = `Attempts Remaining: ${attemptsLeft}`;
            document.getElementById('attempts-left').style.color = 'var(--accent-orange)';
            
            document.getElementById('profile-status').textContent = `Target Profile: ${accountIndex + 1} of 3`;
            
            document.getElementById('feedback').innerHTML = `<strong>System Status:</strong> New target locked. Analyze their personal dossier to find password indicators!`;
            
            // Update lesson panel text
            document.getElementById('lesson-text').innerHTML = db[currentLevel].lesson;
            
            // Populate bio text
            document.getElementById('bio-text').innerHTML = currentAccount.bio;
        }

        function checkPassword() {
            if (gameOver) return;

            const userGuess = document.getElementById('password').value.trim();
            const currentAccount = db[currentLevel].accounts[accountIndex];
            const correctPassword = currentAccount.password;

            if (userGuess === '') {
                document.getElementById('feedback').innerHTML = `<strong>System Alert:</strong> You must enter a guess before attacking the password mainframe.`;
                return;
            }

            if (userGuess === correctPassword) {
                // Scoring system: more points for fewer attempts used
                let pointsEarned = attemptsLeft * 20; 
                score += pointsEarned;
                document.getElementById('total-score').textContent = score;

                document.getElementById('feedback').innerHTML = `<strong style="color: var(--success-green);">🔓 PROFILE CRACKED! (+${pointsEarned} pts)</strong><br>Excellent scouting! You deduced the password using their profile footprint.`;
                
                endRound(true);
            } else {
                attemptsLeft--;
                document.getElementById('attempts-left').textContent = `Attempts Remaining: ${attemptsLeft}`;
                
                if (attemptsLeft <= 0) {
                    document.getElementById('feedback').innerHTML = `<strong style="color: var(--fail-red);">🔒 FIREWALL LOCKOUT! (0 pts)</strong><br>Target changed security configurations. The correct password was: <code>${correctPassword}</code>.`;
                    endRound(false);
                } else {
                    // Pull clue sequentially based on missed attempts
                    let clueIdx = 5 - attemptsLeft - 1;
                    let currentClue = currentAccount.clues[clueIdx] || currentAccount.clues[currentAccount.clues.length - 1];
                    
                    document.getElementById('feedback').innerHTML = `<strong style="color: var(--fail-red);">❌ EXPLOIT FAILED.</strong><br><strong>Intelligence Hint:</strong> ${currentClue}`;
                }
            }
        }

        function endRound(success) {
            gameOver = true;
            document.getElementById('password').disabled = true;
            document.getElementById('submit-btn').disabled = true;
            
            if (success) {
                document.getElementById('attempts-left').textContent = "BREACHED";
                document.getElementById('attempts-left').style.color = "var(--success-green)";
            } else {
                document.getElementById('attempts-left').textContent = "FAILED";
                document.getElementById('attempts-left').style.color = "var(--fail-red)";
            }

            // Show "Next Target" button
            document.getElementById('next-btn').style.display = 'block';
            if (accountIndex === 2) {
                document.getElementById('next-btn').textContent = "Advance Difficulty Level";
            } else {
                document.getElementById('next-btn').textContent = "Next Target Account →";
            }
        }

        function nextAccount() {
            accountIndex++;
            if (accountIndex > 2) {
                // Move up difficulty automatically if they finish 3 profiles
                accountIndex = 0;
                if (currentLevel === 'easy') {
                    currentLevel = 'medium';
                } else if (currentLevel === 'medium') {
                    currentLevel = 'hard';
                } else {
                    alert(`Training Complete! Outstanding work Officer. Final Score: ${score} points!`);
                    currentLevel = 'easy';
                }
                document.getElementById('difficulty').value = currentLevel;
            }
            initRound();
        }

        // Modal Window Scripts
        function openModal() { document.getElementById('bioModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('bioModal').style.display = 'none'; }
        
        window.onclick = function(event) {
            const modal = document.getElementById('bioModal');
            if (event.target == modal) modal.style.display = 'none';
        }

        // Boot system up
        window.onload = initRound;
    </script>
</body>
</html>
